
app = 'jja-job-search-backend'
primary_region = 'lhr'

[build]
  dockerfile = "job-search-backend/Dockerfile"
  
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  compression = "none"

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
